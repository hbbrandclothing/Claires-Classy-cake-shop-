<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brownies</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f6f3f1;
  color:#222;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
  padding:60px 0;
}

h1{
  font-family:'Playfair Display', serif;
  font-size:48px;
  margin-bottom:40px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
  gap:30px;
}

.card{
  background:#fff;
  border-radius:24px;
  padding:18px;
  transition:all 0.3s ease;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(0,0,0,0.08);
}

.card img{
  width:100%;
  border-radius:18px;
  height:220px;
  object-fit:cover;
}

.card h3{
  font-family:'Playfair Display', serif;
  margin:15px 0 5px;
  font-size:20px;
}

.price{
  color:#666;
  font-size:15px;
  margin-bottom:10px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:999px;
  background:#111;
  color:#fff;
  font-size:14px;
  cursor:pointer;
  transition:all 0.25s ease;
}

button:hover{
  background:#333;
}

.subtitle{
  text-align:center;
  color:#777;
  margin-bottom:50px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Our Brownies</h1>
  <p class="subtitle">Handcrafted, rich and indulgent — baked fresh to order</p>

  <div class="grid">
    
    <div class="card">
      <img src="https://source.unsplash.com/400x300/?brownie,chocolate&sig=1">
      <h3>Mars Bar Brownie</h3>
      <p class="price">£4.49</p>
      <button onclick="buyProduct('https://buy.stripe.com/test_mars')">Buy</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?brownie,dessert&sig=2">
      <h3>Bueno Brownie</h3>
      <p class="price">£4.49</p>
      <button onclick="buyProduct('https://buy.stripe.com/test_bueno')">Buy</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?chocolate,brownie&sig=3">
      <h3>Dubai Brownie</h3>
      <p class="price">£4.99</p>
      <button onclick="buyProduct('https://buy.stripe.com/test_dubai')">Buy</button>
    </div>

    <div class="card">
      <img src="https://source.unsplash.com/400x300/?fudge,brownie&sig=4">
      <h3>Classic Chocolate Brownie</h3>
      <p class="price">£4.49</p>
      <button onclick="buyProduct('https://buy.stripe.com/test_classic')">Buy</button>
    </div>

  </div>
</div>

<script>
function buyProduct(link){
  window.location.href = link;
}
</script>

</body>
</html>
