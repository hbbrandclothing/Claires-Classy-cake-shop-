<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cookies</title>
<style>
body{font-family:Arial;background:#f8f8f8}
.container{width:90%;margin:auto;padding:40px 0}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.card{background:#fff;padding:15px;border-radius:20px}
img{width:100%;border-radius:15px}
button{margin-top:10px}
</style>
</head>

<body>
<div class="container">
<h1>Cookies</h1>

<div class="grid">
  <div class="card">
    <img src="cookie1.jpg">
    <h3>Chocolate Chip Cookie</h3>
    <p>£3.00</p>
    <button onclick="orderProduct('Chocolate Chip Cookie')">Order</button>
  </div>

  <div class="card">
    <img src="cookie2.jpg">
    <h3>Double Chocolate Cookie</h3>
    <p>£3.50</p>
    <button onclick="orderProduct('Double Chocolate Cookie')">Order</button>
  </div>
</div>

</div>

<script>
function orderProduct(productName){
const subject="Order Enquiry";
const body=`Hi, I would like to order:\n\n${productName}`;
window.location.href=`mailto:clairesclassycakeshop@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
</script>

</body>
</html>
