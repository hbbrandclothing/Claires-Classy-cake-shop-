<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cookies</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#f6f3f1;
  color:#222;
}

.container{
  width:90%;
  max-width:1200px;
  margin:auto;
  padding:60px 0;
}

h1{
  font-family:'Playfair Display', serif;
  font-size:48px;
  text-align:center;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  color:#777;
  margin-bottom:50px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(280px,1fr));
  gap:30px;
}

/* Card */
.card{
  background:#fff;
  border-radius:28px;
  overflow:hidden;
  box-shadow:0 12px 30px rgba(0,0,0,0.06);
  transition:all 0.3s ease;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 45px rgba(0,0,0,0.08);
}

/* Image */
.card img{
  width:100%;
  height:220px;
  object-fit:cover;
  transition:transform 0.4s ease;
}

.card:hover img{
  transform:scale(1.05);
}

/* Content */
.card-content{
  padding:20px;
}

.category{
  font-size:0.7rem;
  letter-spacing:0.15em;
  text-transform:uppercase;
  color:#888;
}

.card h3{
  font-family:'Playfair Display', serif;
  font-size:20px;
  margin:8px 0;
}

.price{
  color:#555;
  font-size:15px;
  margin-bottom:15px;
}

/* Button */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:999px;
  background:#111;
  color:#fff;
  font-size:14px;
  cursor:pointer;
  transition:all 0.25s ease;
}

button:hover{
  background:#333;
}
</style>
</head>

<body>

<div class="container">
  <h1>Cookies</h1>
  <p class="subtitle">Freshly baked cookies with rich flavour and perfect texture</p>

  <div class="grid">

    <div class="card">
      <img src="cookie1.jpg">
      <div class="card-content">
        <span class="category">Luxury Bake</span>
        <h3>Cookie coming soon...</h3>
        <p class="price">£3.00</p>
  
      </div>
    </div>

    <div class="card">
      <img src="cookie2.jpg">
      <div class="card-content">
        <span class="category">Luxury Bake</span>
        <h3>Cookie coming soon...</h3>
        <p class="price">£3.50</p>
      </div>
    </div>

  </div>
</div>

<script>
function orderProduct(productName){
  const subject="Order Enquiry";
  const body=`Hi, I would like to order:\n\n${productName}`;
  window.location.href=`mailto:clairesclassycakeshop@gmail.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}
</script>

</body>
</html>
