<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tray Bakes</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: #ffffff;
  color: #222;
}

.traybake-section {
  text-align: center;
  padding: 80px 20px;
}

.traybake-section h2 {
  font-family: 'Playfair Display', serif;
  font-size: 40px;
  margin-bottom: 10px;
}

.subtitle {
  color: #777;
  margin-bottom: 50px;
}

.products {
  max-width: 1100px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 28px;
}

.product-card {
  background: #fff;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 15px 35px rgba(0,0,0,0.08);
}

.img-wrap {
  height: 200px;
  overflow: hidden;
}

.img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.product-info {
  padding: 18px;
  text-align: left;
  display: flex;
  flex-direction: column;
  flex: 1;
}

.product-info h3 {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  margin-bottom: 6px;
}

.product-info p {
  font-size: 13px;
  color: #666;
  margin-bottom: 14px;
}

.bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
}

button {
  background: #111;
  color: #fff;
  border: none;
  padding: 8px 16px;
  border-radius: 999px;
  cursor: pointer;
  transition: background 0.2s ease;
}

button:hover {
  background: #333;
}
</style>
</head>

<body>

<section class="traybake-section">

  <h2>Our Tray Bakes</h2>
  <p class="subtitle">Delicious, soft and indulgent tray bakes made fresh</p>

  <div class="products">

    <!-- Chocolate Tray Bake -->
    <div class="product-card">
      <div class="img-wrap">
        <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&w=800&q=80">
      </div>
      <div class="product-info">
        <h3>Old School Chocolate Cake</h3>
        <p>Classic soft chocolate sponge topped with rich icing.</p>
        <div class="bottom">
          <span>£3.25</span>
<button onclick="alert('clicked')">Test Button</button>
          <button onclick="window.open('https://buy.stripe.com/cNi28j0WwbF24TqdADfnO08')">Buy</button>
        </div>
      </div>
    </div>

    <!-- Vanilla Tray Bake -->
    <div class="product-card">
      <div class="img-wrap">
        <img src="https://images.unsplash.com/photo-1607478900766-efe13248b125?auto=format&fit=crop&w=800&q=80">
      </div>
      <div class="product-info">
        <h3>Old School Cake</h3>
        <p>Light vanilla sponge finished with icing and sprinkles.</p>
        <div class="bottom">
          <span>£3.25</span>
          <button onclick="addToCart({ name: 'Old school cake', price: £3.25 })">
  Add to Basket
</button>
          <button onclick="window.open('https://buy.stripe.com/cNifZ96gQ38wadK547fnO09')">Buy</button>
        </div>
      </div>
    </div>

  </div>

</section>

</body>
</html>
